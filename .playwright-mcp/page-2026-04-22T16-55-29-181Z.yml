                  - strong [ref=e163]: Post-crying Lip Texture
                - paragraph [ref=e164]:
                  - text: This example features imagery of lips taken from a post-crying event. Here, the lips are on the stickier end of things and slightly dry.
                  - text: When the sympathetic nervous system (the system involved in our “fight-or-flight” response) is stimulated, saliva becomes more viscous and protein-rich. These changes in viscosity and composition can cause the mouth to become dryer and the lips to become stickier.
                  - text: Distressing emotional events like intense crying can activate the sympathetic nervous system and lead to sticky lips; so always think about context when deciding how sticky to make a character’s mouth!
