                - paragraph [ref=e88]: "NOTE: You may see medial frontalis listed as “pars medialis” in FACS-based materials. This description is semi-archaic. “Pars medialis” is just a fancy Latin way to say “medial part.” Most people in the medical world simply specify that they are referring to the medial area."
                - list [ref=e89]:
                  - listitem [ref=e90]: Perceived to be difficult perform voluntarily; however this may be a misconception due to idealization of how inner brow raiser should behave. (See note below on frontalis diversity.)
                  - listitem [ref=e91]:
                    - text: Commonly combines with AU 2 to create full brow raise (AUs 1+2)
                    - list [ref=e92]:
                      - listitem [ref=e93]: Full brow raise is a signature marker in speech for word emphasis, attentiveness, and punctuation
                      - listitem [ref=e94]: It is also a major component of the surprise emotion prototype, which features AU 5 and 25+26 (lips parted with jaw drop, respectively)
                  - listitem [ref=e95]: Combines with AU 4 to create prototypic brow configuration for sadness (AUs 1+4)
                  - listitem [ref=e96]: Also combines with AUs 2 and 4 for fear emotion brow prototypes (AUs 1+2+4)
